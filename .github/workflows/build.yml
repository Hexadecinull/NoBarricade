name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install terser
        run: npm install terser --no-save

      - name: Minify library
        run: |
          npx terser nobarricade.js \
            --compress passes=3,drop_console=false \
            --mangle \
            --output nobarricade.min.js \
            --source-map "url='nobarricade.min.js.map'"

      - name: Upload minified artifact
        uses: actions/upload-artifact@v4
        with:
          name: nobarricade-dist
          path: |
            nobarricade.js
            nobarricade.min.js
            nobarricade.min.js.map

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            nobarricade.js
            nobarricade.min.js
          generate_release_notes: true
